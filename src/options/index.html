<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Use — Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="app">
    <h1>Browser Use Options</h1>

    <form id="config-form">
      <div class="form-group">
        <label for="providerPreset">Provider Preset</label>
        <select id="providerPreset">
          <option value="minimax" selected>MiniMax</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="google">Google</option>
          <option value="openrouter">OpenRouter</option>
          <option value="custom">Custom</option>
        </select>
        <span id="preset-info" class="field-note"></span>
      </div>

      <hr class="section-divider">

      <div class="form-group">
        <label for="apiBaseUrl">API Base URL</label>
        <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
      </div>

      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
        <span class="field-note">Stored unencrypted in chrome.storage.local</span>
      </div>

      <div class="form-group">
        <label for="modelName">Model Name</label>
        <input type="text" id="modelName" placeholder="gpt-4o">
      </div>

      <div class="form-group">
        <label for="maxTokens">Max Tokens</label>
        <input type="number" id="maxTokens" min="1" value="4096">
      </div>

      <div class="form-group">
        <label for="temperature">Temperature</label>
        <input type="number" id="temperature" min="0" max="2" step="0.1" value="0.2">
      </div>

      <div class="form-group">
        <label for="screenshotDetail">Screenshot Detail</label>
        <select id="screenshotDetail">
          <option value="low">Low</option>
          <option value="high">High</option>
        </select>
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="visionEnabled" checked>
          Vision Enabled
        </label>
      </div>

      <div class="form-group">
        <label for="maxIterations">Max Iterations</label>
        <input type="number" id="maxIterations" min="1" value="50">
      </div>

      <div class="form-group">
        <label for="actionDelay">Action Delay (ms)</label>
        <input type="number" id="actionDelay" min="0" value="500">
      </div>

      <button type="submit" id="save-btn">Save</button>
      <span id="status-msg" class="status-msg"></span>
    </form>
  </div>

  <script type="module" src="options.ts"></script>
</body>
</html>
